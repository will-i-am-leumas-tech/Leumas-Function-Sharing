<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Leumas Function Mesh logo</title>
  <desc id="desc">A high tech logo showing repository scanning, a connected function mesh, and a terminal runner.</desc>
  <defs>
    <linearGradient id="bg" x1="50" y1="20" x2="1130" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.54" stop-color="#0B1728"/>
      <stop offset="1" stop-color="#102013"/>
    </linearGradient>
    <linearGradient id="mesh" x1="230" y1="86" x2="520" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#40E0FF"/>
      <stop offset="0.54" stop-color="#33F0A4"/>
      <stop offset="1" stop-color="#FFB84D"/>
    </linearGradient>
    <linearGradient id="panel" x1="70" y1="68" x2="540" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12233A"/>
      <stop offset="1" stop-color="#0B1524"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.15 0 0 0 0 0.92 0 0 0 0 0.78 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font: 700 70px Arial, Helvetica, sans-serif; letter-spacing: 0; fill: #F4FBFF; }
      .tag { font: 700 22px Arial, Helvetica, sans-serif; letter-spacing: 0; fill: #9AB0C7; }
      .mini { font: 700 19px Arial, Helvetica, sans-serif; letter-spacing: 0; fill: #C8F8FF; }
      .code { font: 700 18px "SFMono-Regular", Consolas, monospace; letter-spacing: 0; fill: #C9F2E2; }
      .core { fill: #08111E; }
    </style>
  </defs>

  <rect x="24" y="24" width="1152" height="372" rx="34" fill="url(#bg)"/>
  <rect x="24.5" y="24.5" width="1151" height="371" rx="33.5" stroke="#263A55"/>

  <g opacity="0.28">
    <path d="M58 118H270M58 178H218M58 238H272M58 298H194" stroke="#3C5572" stroke-width="2"/>
    <path d="M640 72H1118M610 128H1068M646 184H1130M622 240H1088M662 296H1138M610 352H1066" stroke="#33506F" stroke-width="2"/>
  </g>

  <g transform="translate(74 70)">
    <rect x="0" y="0" width="448" height="280" rx="26" fill="url(#panel)" stroke="#2B405D" stroke-width="2"/>
    <rect x="22" y="24" width="118" height="82" rx="12" fill="#0D1A2A" stroke="#2D8FFF" stroke-width="2"/>
    <path d="M22 48H62L76 34H138" stroke="#57C7FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="42" y="88" class="mini">repo</text>

    <rect x="300" y="174" width="118" height="82" rx="12" fill="#0D1A2A" stroke="#33F0A4" stroke-width="2"/>
    <path d="M322 210H394" stroke="#33F0A4" stroke-width="6" stroke-linecap="round"/>
    <path d="M322 231H374" stroke="#33F0A4" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
    <text x="326" y="200" class="mini">run</text>

    <path d="M148 64C203 65 224 102 237 132" stroke="#40E0FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 12"/>
    <path d="M260 148C290 158 313 175 330 196" stroke="#33F0A4" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 12"/>
    <path d="M344 168L330 196L302 184" stroke="#33F0A4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g filter="url(#softGlow)">
      <path d="M218 98L282 134V206L218 242L154 206V134L218 98Z" fill="#0A1625" stroke="url(#mesh)" stroke-width="5"/>
      <circle cx="218" cy="98" r="10" fill="#40E0FF"/>
      <circle cx="282" cy="134" r="10" fill="#33F0A4"/>
      <circle cx="282" cy="206" r="10" fill="#FFB84D"/>
      <circle cx="218" cy="242" r="10" fill="#33F0A4"/>
      <circle cx="154" cy="206" r="10" fill="#40E0FF"/>
      <circle cx="154" cy="134" r="10" fill="#FFB84D"/>
      <circle cx="218" cy="170" r="16" fill="#F4FBFF"/>
      <path d="M218 114V154M268 143L234 163M268 198L234 178M218 226V186M168 198L202 178M168 143L202 163" stroke="#8EEBFF" stroke-width="3" stroke-linecap="round"/>
    </g>

    <text x="181" y="178" class="code core">&lt;/&gt;</text>
    <text x="159" y="274" class="mini">function mesh</text>
  </g>

  <g transform="translate(574 108)">
    <text x="0" y="72" class="label">Leumas</text>
    <text x="0" y="144" class="label" fill="#DDF8FF">Function Mesh</text>
    <text x="2" y="194" class="tag">SCAN REPOS  ->  INDEX CALLABLES  ->  RUN FROM CLI</text>
    <g transform="translate(2 226)">
      <rect x="0" y="0" width="182" height="42" rx="8" fill="#0D1A2A" stroke="#2C4666"/>
      <text x="18" y="28" class="code">&gt; leumas-mesh</text>
      <rect x="204" y="0" width="94" height="42" rx="8" fill="#111D2E" stroke="#315A7A"/>
      <text x="226" y="28" class="code">JS</text>
      <rect x="314" y="0" width="94" height="42" rx="8" fill="#10251F" stroke="#327D64"/>
      <text x="335" y="28" class="code">PY</text>
      <rect x="424" y="0" width="118" height="42" rx="8" fill="#2B2111" stroke="#9B7330"/>
      <text x="447" y="28" class="code">EXE</text>
    </g>
  </g>
</svg>
